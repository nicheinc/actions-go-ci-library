name: CI

# Restrict permissions to just reading contents.
permissions:
  contents: read

# This action is solely available as a re-usable action to be called from other
# workflows.
on:
  workflow_call:
    inputs:
      module-root-filepath:
        description: >
          The filepath within the repository at which the Go module to be CI'ed
          is located. By default, this action assumes the Go module is located
          at the root of the repository.
        required: false
        default: .
        type: string
    secrets:
      # READ_ACCESS_TOKEN ought to be a GitHub token with read access to any and
      # all private nicheinc repositories containing Go modules that this
      # library depends on.

      # This action needs this token in order to be able to pull source code
      # from GitHub while building the library under test. This allows this
      # re-usable action to run for any Go module that depends on nicheinc
      # GitHub repositories, even if the library doesn't itself have vendored
      # dependencies checked into the repo.

      # If the library being tested doesn't have any dependencies on private
      # nicheinc repositories, then this token is not required. The action will
      # still be able to pull any public dependencies from the public Go module
      # mirror.
      READ_ACCESS_TOKEN:
        required: false

jobs:
  # Retrieve the minimum Go version from go.mod and output a matrix of all Go
  # versions released since.
  go-versions:
    name: Check Go Versions
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.versions.outputs.matrix }}
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Set Go Versions
        id: versions
        # go-version-action@v1.1.20
        uses: arnested/go-version-action@b4aefb809febc150eb645efd31b1a3fd50b2068a
        with:
          working-directory: ${{ inputs.module-root-filepath }}

  # Run unit tests and go vet with each supported Go version.
  unit-test-and-vet:
    name: Unit test and vet with Go ${{ matrix.go }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.module-root-filepath }}
    needs: go-versions
    strategy:
      fail-fast: false
      matrix:
        go: ${{ fromJSON(needs.go-versions.outputs.matrix) }}
    steps:
      - name: Checkout code
        id: checkout
        uses: actions/checkout@v4

      - name: Install Go
        id: install-go
        uses: actions/setup-go@v5
        with:
          # Callers using the library undergoing CI may use the library in a
          # project built with any Go version greater than or equal to the
          # minimum Go version specified in the library's go.mod file. When
          # they do that, they will expect the code in this library to compile,
          # run tests, and vet against that specific Go minor version.
          # Therefore, we should verify that ALL of those Go versions will work
          # when compiling, testing, and vetting this library.
          go-version: ${{ matrix.go }}

        # We only need to configure private Go modules if the READ_ACCESS_TOKEN
        # secret is present, indicating the module depends on private Go
        # modules.
      - name: Configure private Go modules
        id: configure-private-modules
        if: env.READ_ACCESS_TOKEN
        env:
          READ_ACCESS_TOKEN: ${{ secrets.READ_ACCESS_TOKEN }}
        run: |
          # Tell go that github.com/nicheinc modules can't always be found on
          # the public Go module mirror.
          go env -w GOPRIVATE=github.com/nicheinc

          # Equip git with the READ_ACCESS_TOKEN token that has permissions to
          # read the contents of private repos in the nicheinc GitHub org.
          git config --global --add \
            url.https://${{ env.READ_ACCESS_TOKEN }}@github.com/.insteadOf \
            https://github.com/

      - name: Test
        id: test
        uses: robherley/go-test-action@b19f6aadabfb1ad85079065b21aa2af132466468
        with:
          testArguments: "-v -race ./..."
          moduleDirectory: ${{ inputs.module-root-filepath }}

      - name: Vet
        id: vet
        run: |
          go vet ./...

  # Run linter on the library codebase.
  lint:
    name: Run linter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.module-root-filepath }}
    steps:
      - name: Checkout code
        id: checkout
        uses: actions/checkout@v4

      - name: Install Go
        id: install-go
        uses: actions/setup-go@v5
        with:
          # Callers using the library undergoing CI may use the library in a
          # project built with any Go version greater than or equal to the
          # minimum Go version specified in the library's go.mod file. However,
          # callers of the library should not expect to run a code linter built
          # with that Go version on the source code in this library (the
          # decision of what code formatting standard to uphold in the library
          # is left up to the library developers, not the folks calling the
          # library). Therefore, we can just run the linter once using the
          # latest stable Go release -- it's most helpful to the library
          # developer to see the 'latest and greatest' of linting results.
          go-version: "stable"

      - name: gofumpt
        id: run-gofumpt
        run: |
          # gofumpt@v0.7.0
          go run mvdan.cc/gofumpt@86bffd62437a3c437c0b84d5d5ab244824e762fc -l -w .

          # If any files would be changed by running gofumpt, then fail the
          # check.
          if [[ $(git status --porcelain) ]]; then
            echo "The above files are not formatted with gofumpt."
            echo "Please run 'go run mvdan.cc/gofumpt@latest -l -w .' and commit the changes."
            exit 1
          fi

  # Ensure code changes and go.mod are compatible.
  validate-semver:
    name: Validate semver
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base branch
        id: checkout-base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base-branch

      - name: Checkout current branch
        id: checkout-current
        uses: actions/checkout@v4
        with:
          path: current-branch

      - name: Install Go
        id: install-go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

        # We only need to configure private Go modules if the READ_ACCESS_TOKEN
        # secret is present, indicating the module depends on private Go
        # modules.
      - name: Configure private Go modules
        id: configure-private-modules
        if: env.READ_ACCESS_TOKEN
        env:
          READ_ACCESS_TOKEN: ${{ secrets.READ_ACCESS_TOKEN }}
        run: |
          # Tell go that github.com/nicheinc modules can't always be found on
          # the public Go module mirror.
          go env -w GOPRIVATE=github.com/nicheinc

          # Equip git with the READ_ACCESS_TOKEN token that has permissions to
          # read the contents of private repos in the nicheinc GitHub org.
          git config --global --add \
            url.https://${{ env.READ_ACCESS_TOKEN }}@github.com/.insteadOf \
            https://github.com/

      - name: Detect module version on base branch
        id: get-base-module-version
        working-directory: base-branch/${{ inputs.module-root-filepath }}
        run: |
          regex='/v([0-9]+)$'
          if [[ $(go list -m) =~ ${regex} ]]; then
              version=${BASH_REMATCH[1]}
          else
              echo "Explicit version not found in go.mod - treating it as v1."
              version=1
          fi
          echo "Base branch module version: v${version}"
          echo "version=${version}" >> $GITHUB_OUTPUT

      - name: Detect module version on current branch
        id: get-current-module-version
        working-directory: current-branch/${{ inputs.module-root-filepath }}
        run: |
          regex='/v([0-9]+)$'
          if [[ $(go list -m) =~ ${regex} ]]; then
              version=${BASH_REMATCH[1]}
          else
              echo "Explicit version not found in go.mod - treating it as v1."
              version=1
          fi
          echo "Current branch module version: v${version}"
          echo "version=${version}" >> $GITHUB_OUTPUT

      - name: Use apidiff to detect breaking changes
        id: apidiff
        run: |
          go install golang.org/x/exp/cmd/apidiff@v0.0.0-20251002181428-27f1f14c8bb9 # 2025-10-02

          # Generate export data for each branch.
          (
            cd base-branch/${{ inputs.module-root-filepath }}
            apidiff -m -w "${{ github.workspace }}"/baseline.txt ./...
          )
          (
            cd current-branch/${{ inputs.module-root-filepath }}
            apidiff -m -w "${{ github.workspace }}"/new.txt ./...
          )

          results=$(apidiff -m -incompatible baseline.txt new.txt)
          echo "::group::apidiff output"
          echo "Breaking changes:"
          echo "${results}"
          echo "::endgroup::"

          if [[ -z ${results} ]]; then
            echo "No breaking changes detected."
            exit 0
          fi

          echo "This PR may contain breaking changes. See apidiff output for details."
          baseline=${{ steps.get-base-module-version.outputs.version }}
          new=${{ steps.get-current-module-version.outputs.version }}
          if [[ ${baseline} == ${new} ]]; then
            echo "Is this breakage intentional? If so, consider incrementing the module version."
            echo "Alternatively, if the affected packages are not intended to be part of this"
            echo "module's public API, consider making them internal. Finally, if this module is"
            echo "on v0, you may choose to ignore this error."
            exit 1
          fi

  # This job provides a single target that libraries can use for required
  # status checks for branch protection rulesets. By combining all the required
  # checks into this job, it allows us to change the set of required checks
  # without needing to update the branch protection rules in all the repos
  # using this action.
  required-check:
    name: Verify that all required jobs passed
    runs-on: ubuntu-latest
    # Generally speaking, we don't require that semver be respected in order to
    # consider CI as passed. Though we generally do follow semver and want to
    # be alerted in CI if a PR would break it, that's primarily to avoid
    # inadvertently breaking semver. If we are purposefully breaking semver, we
    # should be able to do so.
    needs: [unit-test-and-vet, lint]
    steps:
      - name: Verify unit tests passed with all Go versions
        run: |
          result="${{ needs.unit-test-and-vet.result }}"
          if [[ ${result} == "failure" ]]; then
            exit 1
          fi
      - name: Verify linting passed
        run: |
          result="${{ needs.lint.result }}"
          if [[ ${result} == "failure" ]]; then
            exit 1
          fi
